name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest + coverage)
        env:
          # deliberately no GROQ_API_KEY / LANGFUSE_* secrets here -- the
          # suite is designed to run fully offline via compose_node's
          # documented no-key fallback (see tests/test_agent.py, tests/test_integration.py)
          PYTHONUNBUFFERED: "1"
        run: pytest -q --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
