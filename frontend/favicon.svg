<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <defs>
    <clipPath id="lens-clip">
      <circle cx="92" cy="118" r="27"></circle>
    </clipPath>
  </defs>

  <!-- background so the mark stays legible on browser chrome (light or dark) -->
  <rect x="0" y="0" width="220" height="220" rx="44" fill="#F1ECE2"></rect>

  <!-- soft overlapping colour blobs -->
  <circle cx="90" cy="102" r="60" fill="#2F7A67" opacity=".5"></circle>
  <circle cx="128" cy="66" r="42" fill="#9A7326" opacity=".38"></circle>
  <circle cx="148" cy="116" r="48" fill="#A85B41" opacity=".55" style="mix-blend-mode:multiply"></circle>

  <!-- magnifying glass with a close-up "skin texture" pattern in the lens -->
  <g clip-path="url(#lens-clip)">
    <circle cx="92" cy="118" r="27" fill="#F8F2E6"></circle>
    <circle cx="80" cy="107" r="4" fill="#A85B41" opacity=".7"></circle>
    <circle cx="93" cy="100" r="3" fill="#A85B41" opacity=".7"></circle>
    <circle cx="105" cy="111" r="4.5" fill="#A85B41" opacity=".7"></circle>
    <circle cx="85" cy="122" r="3.5" fill="#A85B41" opacity=".7"></circle>
    <circle cx="100" cy="127" r="4" fill="#A85B41" opacity=".7"></circle>
    <circle cx="75" cy="131" r="3" fill="#A85B41" opacity=".7"></circle>
    <circle cx="110" cy="129" r="3" fill="#A85B41" opacity=".7"></circle>
    <circle cx="95" cy="114" r="2.4" fill="#A85B41" opacity=".7"></circle>
    <circle cx="70" cy="115" r="2.4" fill="#A85B41" opacity=".7"></circle>
  </g>
  <circle cx="92" cy="118" r="27" fill="none" stroke="#2B2622" stroke-width="4"></circle>
  <line x1="112" y1="138" x2="132" y2="158" stroke="#2B2622" stroke-width="5.5" stroke-linecap="round"></line>

  <!-- side-profile line -->
  <path fill="none" stroke="#2B2622" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"
    d="M72,48 C92,40 110,48 119,64 C127,78 121,91 133,101
       C145,111 163,105 171,117 C177,127 165,133 153,135 C143,137 137,143 141,153
       C145,163 157,165 153,177 C149,189 135,187 127,181 C119,176 113,181 113,191
       C113,201 121,209 113,217 C105,225 93,221 85,229"></path>
</svg>
